{% extends "base.html" %}

{% block title %}Settings — Ramtime{% endblock %}

{% block content %}
<div class="row">
  <div class="col-lg-5 mx-auto">

    <h1 class="h4 mb-4">Settings</h1>

    <div class="card">
      <div class="card-header">Billing defaults</div>
      <div class="card-body">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="default_minimum_hours" class="form-label">
              Default minimum hours per entry
            </label>
            <input type="number" class="form-control" id="default_minimum_hours"
                   name="default_minimum_hours"
                   value="{{ setting.value if setting else '0.00' }}"
                   min="0" step="0.25" required>
            <div class="form-text">
              If an employee's actual time is less than this, their billed time will
              be rounded up to this minimum. Set to 0 to disable.
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Save</button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
