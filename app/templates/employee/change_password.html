{% extends "base.html" %}

{% block title %}Change Password — Ramtime{% endblock %}

{% block content %}
<div class="row">
  <div class="col-lg-4 mx-auto">
    <h1 class="h4 mb-4">Change password</h1>

    <form method="post">
      <div class="mb-3">
        <label for="current_password" class="form-label">Current password</label>
        <input type="password" class="form-control" id="current_password"
               name="current_password" autocomplete="current-password" required>
      </div>

      <div class="mb-3">
        <label for="new_password" class="form-label">New password</label>
        <input type="password" class="form-control" id="new_password"
               name="new_password" autocomplete="new-password"
               minlength="8" required>
        <div class="form-text">At least 8 characters.</div>
      </div>

      <div class="mb-4">
        <label for="confirm_password" class="form-label">Confirm new password</label>
        <input type="password" class="form-control" id="confirm_password"
               name="confirm_password" autocomplete="new-password"
               minlength="8" required>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Update password</button>
        <a href="{{ url_for('employee.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
